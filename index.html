<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Agendamento da Sala de Informática da EEJSA</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .container {
      padding: 20px;
    }

    .logo {
      width: 120px;
      margin-top: 20px;
    }

    .titulo {
      margin-top: 10px;
      font-weight: bold;
      font-size: 22px;
      background: linear-gradient(90deg, #ffffff, #ffd54f, #ffffff);
      background-size: 200%;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: brilho 3s linear infinite;
    }

    @keyframes brilho {
      0% { background-position: 0%; }
      100% { background-position: 200%; }
    }

    .card {
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: 20px auto;
    }

    input,
    select,
    button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      border-radius: 5px;
      border: none;
      box-sizing: border-box;
    }

    button {
      background: #ff9800;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .btn-excluir {
      background: #e53935;
    }

    .btn-editar {
      background: #43a047;
    }

    /* 🔥 BOTÃO LOGOUT */
    .btn-logout {
      background: linear-gradient(135deg, #e53935, #b71c1c);
      font-weight: bold;
    }

    ul {
      list-style: none;
      padding: 0;
      max-width: 400px;
      margin: 0 auto;
    }

    li {
      background: white;
      color: black;
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
    }

    .turno {
      margin-top: 15px;
      font-weight: bold;
      color: #ffd54f;
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="logo.png" class="logo">

    <h2 class="titulo">Sistema de Agendamento<br>da Sala de Informática da EEJSA</h2>

    <div class="card">

      <!-- 🔥 LOGIN / LOGOUT -->
      <button id="btnLogin" onclick="loginGoogle()">Login com Google</button>
      <button id="btnLogout" class="btn-logout" onclick="logout()" style="display:none;">Sair</button>

      <p id="usuario"></p>

      <hr>

      <label>Nome do professor</label>
      <input type="text" id="nome">

      <label>Turma</label>
      <input type="text" id="turma">

      <label>Disciplina</label>
      <input type="text" id="disciplina">

      <label>Data</label>
      <input type="date" id="data">

      <label>Horário</label>
      <select id="hora"></select>

      <button onclick="agendar()">Agendar</button>

    </div>

    <h3>Agendamentos</h3>
    <ul id="lista"></ul>

    <p style="margin-top:20px;">© 2026 Marcelo Leite. Todos os direitos reservados.</p>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBdRUdyjwHw8uPe1K6OOGrNg0AN9j07Q9Y",
      authDomain: "agenda-sala-de-informatica.firebaseapp.com",
      projectId: "agenda-sala-de-informatica"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const horarios = [
      "07:00","07:50","08:40","09:50","10:40",
      "12:30","13:20","14:10","15:20",
      "18:30","19:20","20:20","21:10","22:00"
    ];

    const emailsPermitidos = [
      "credial3053@gmail.com",
      "marceloleite260981@gmail.com",
      "eldanerislima@gmail.com",
      "danilosalesbass@gmail.com",
      "nathanamaral54@gmail.com",
      "diegodeguarulhos@gmail.com"
    ];

    let usuarioLogado = null;

    function getTurno(hora) {
      if (hora < "12:00") return "Manhã";
      if (hora < "18:00") return "Tarde";
      return "Noite";
    }

    async function carregarHorarios() {
      const select = document.getElementById("hora");
      const dataSelecionada = document.getElementById("data").value;

      select.innerHTML = `<option value="">Selecione um horário</option>`;

      const snapshot = await getDocs(collection(db, "agendamentos"));
      let ocupados = [];

      snapshot.forEach(d => {
        const item = d.data();
        if (item.data === dataSelecionada) {
          ocupados.push(item.hora);
        }
      });

      let turnoAtual = "";
      let grupoAtual = null;

      horarios.forEach(hora => {
        const turno = getTurno(hora);

        if (turno !== turnoAtual) {
          turnoAtual = turno;
          grupoAtual = document.createElement("optgroup");
          grupoAtual.label = turno;
          select.appendChild(grupoAtual);
        }

        const option = document.createElement("option");
        option.value = hora;
        option.textContent = hora;

        if (ocupados.includes(hora)) {
          option.disabled = true;
          option.style.color = "red";
          option.textContent += " (ocupado)";
        }

        grupoAtual.appendChild(option);
      });
    }

    document.getElementById("data").addEventListener("change", carregarHorarios);

    window.loginGoogle = async function () {
      const provider = new GoogleAuthProvider();
      const result = await signInWithPopup(auth, provider);
      const email = result.user.email;

      if (!emailsPermitidos.includes(email)) {
        alert("Você não tem permissão!");
        return;
      }
    };

    // 🔥 CONTROLE LOGIN / LOGOUT
    onAuthStateChanged(auth, (user) => {
      const btnLogin = document.getElementById("btnLogin");
      const btnLogout = document.getElementById("btnLogout");

      if (user) {
        usuarioLogado = user;
        document.getElementById("usuario").innerText = "Logado: " + user.email;

        btnLogin.style.display = "none";
        btnLogout.style.display = "block";

        listar();
      } else {
        usuarioLogado = null;
        document.getElementById("usuario").innerText = "";

        btnLogin.style.display = "block";
        btnLogout.style.display = "none";
      }
    });

    // 🔥 LOGOUT
    window.logout = async function () {
      await signOut(auth);
      alert("Você saiu da conta!");
    };

    window.agendar = async function () {

      if (!usuarioLogado) {
        alert("Faça login primeiro!");
        return;
      }

      if (!emailsPermitidos.includes(usuarioLogado.email)) {
        alert("Sem permissão!");
        return;
      }

      const nome = document.getElementById("nome").value;
      const turma = document.getElementById("turma").value;
      const disciplina = document.getElementById("disciplina").value;
      const data = document.getElementById("data").value;
      const hora = document.getElementById("hora").value;

      if (!nome || !turma || !disciplina || !data || !hora) {
        alert("Preencha tudo!");
        return;
      }

      const snapshot = await getDocs(collection(db, "agendamentos"));

      let conflito = false;

      snapshot.forEach((d) => {
        const item = d.data();
        if (item.data === data && item.hora === hora) {
          conflito = true;
        }
      });

      if (conflito) {
        alert("Horário ocupado!");
        return;
      }

      await addDoc(collection(db, "agendamentos"), {
        nome,
        turma,
        disciplina,
        data,
        hora,
        email: usuarioLogado.email
      });

      alert("Agendado com sucesso!");
      listar();
      carregarHorarios();
    };

    async function listar() {
      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      const snapshot = await getDocs(collection(db, "agendamentos"));
      let dados = [];

      snapshot.forEach((d) => {
        dados.push({ id: d.id, ...d.data() });
      });

      dados.sort((a, b) => {
        if (a.data === b.data) return a.hora.localeCompare(b.hora);
        return a.data.localeCompare(b.data);
      });

      dados.forEach((item) => {
        const dataFormatada = new Date(item.data).toLocaleDateString("pt-BR");

        let botoes = "";

        if (usuarioLogado && usuarioLogado.email === item.email) {
          botoes = `
        <button class="btn-editar" onclick="editar('${item.id}', '${item.data}', '${item.hora}')">Editar</button>
        <button class="btn-excluir" onclick="excluir('${item.id}')">Excluir</button>
      `;
        }

        lista.innerHTML += `
      <li>
        <strong>${dataFormatada} - ${item.hora}</strong><br>
        ${item.nome} (${item.turma})<br>
        📚 ${item.disciplina || "Não informado"}<br>
        ${botoes}
      </li>
    `;
      });
    }

    window.excluir = async function (id) {
      if (confirm("Deseja excluir?")) {
        await deleteDoc(doc(db, "agendamentos", id));
        listar();
        carregarHorarios();
      }
    };

    window.editar = async function (id, dataAtual, horaAtual) {

      const novaData = prompt("Nova data (AAAA-MM-DD):", dataAtual);
      const novaHora = prompt("Novo horário (HH:MM):", horaAtual);

      if (!novaData || !novaHora) return;

      await updateDoc(doc(db, "agendamentos", id), {
        data: novaData,
        hora: novaHora
      });

      alert("Atualizado com sucesso!");
      listar();
      carregarHorarios();
    };

  </script>

</body>

</html>
